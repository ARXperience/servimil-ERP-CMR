version: '3.9'

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: servimil_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: servimil_db
      POSTGRES_USER: servimil
      POSTGRES_PASSWORD: servimil_pass
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U servimil -d servimil_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servimil_network

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: servimil_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servimil_network

  # ---- Backend API (NestJS) ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: servimil_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://servimil:servimil_pass@postgres:5432/servimil_db
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - whatsapp_sessions:/app/sessions
    networks:
      - servimil_network

  # ---- Frontend (Next.js) ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: servimil_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - servimil_network

  # ---- PgAdmin (Dev Only) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servimil_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@servimil.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - servimil_network
    profiles:
      - tools

  # ---- Redis Commander (Dev Only) ----
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: servimil_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - servimil_network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  whatsapp_sessions:
    driver: local

networks:
  servimil_network:
    driver: bridge
